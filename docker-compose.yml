version: '3.8'

services:
  dashboard:
    build: .
    container_name: app-dashboard
    ports:
      - "80:80"
    environment:
      - APP1=http://9.60.247.25:8002/
      - APP2=http://9.60.247.25:8003/
      - APP3=http://9.60.247.25:8001/
      - DASHBOARD_PORT=80
    restart: unless-stopped
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge

